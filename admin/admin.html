<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | Memo by Miraal</title>
  <link rel="icon" type="image/png" sizes="256x256" href="../assets/memo-favicon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css?v=4">
</head>
<body>
  <main class="admin-auth" id="authView">
    <section class="auth-card">
      <img src="../assets/memo-logo.png" alt="Memo by Miraal">
      <p class="eyebrow">Private admin</p>
      <h1>Memo Control Room</h1>
      <div class="auth-tabs">
        <button class="active" data-auth-tab="login">Login</button>
        <button data-auth-tab="signup">First signup</button>
      </div>
      <form id="loginForm" class="auth-form">
        <input name="email" type="email" placeholder="Admin email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Log in</button>
        <button class="link-button" type="button" data-auth-mode="forgot">Forgot password?</button>
      </form>
      <form id="signupForm" class="auth-form hidden">
        <input name="name" placeholder="Super Admin name" required minlength="2">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password, 8+ characters" required minlength="8">
        <button type="submit">Create Super Admin</button>
      </form>
      <form id="forgotPasswordForm" class="auth-form hidden">
        <p class="auth-help">Enter the registered admin email and we will send a recovery link.</p>
        <input name="email" type="email" placeholder="Registered admin email" required>
        <button type="submit">Send recovery email</button>
        <button class="link-button" type="button" data-auth-mode="login">Back to login</button>
      </form>
      <form id="resetPasswordForm" class="auth-form hidden">
        <p class="auth-help">Choose a new password for this admin account.</p>
        <input name="password" type="password" placeholder="New password, 8+ characters" required minlength="8">
        <input name="confirm_password" type="password" placeholder="Confirm new password" required minlength="8">
        <button type="submit">Update password</button>
        <button class="link-button" type="button" data-auth-mode="login">Back to login</button>
      </form>
      <p class="auth-message" id="authMessage" aria-live="polite"></p>
    </section>
  </main>

  <script src="admin.js?v=5"></script>
</body>
</html>
